name: manufacturing_app
description: Manufacturing Order Management App - Track raw materials, customer supply orders, and production jobs with role-based access control.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.0

  # Google Fonts
  google_fonts: 8.1.0
  
  # Firebase & Auth
  firebase_core: ^4.0.0
  firebase_auth: ^6.0.0
  google_sign_in: ^7.2.0
  
  # Backend - Supabase
  supabase_flutter: ^2.8.0
  
  # State Management
  provider: ^6.1.5+1
  
  # UI & Date
  flutter_datetime_picker_plus: ^2.1.0
  intl: 0.20.2
  cached_network_image: ^3.3.0
  
  # Utilities
  uuid: ^4.0.0
  shared_preferences: ^2.2.0
  flutter_dotenv: ^6.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: 6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  adaptive_icon_background: "#CC2200"
  adaptive_icon_foreground: "assets/images/logo.png"
  remove_alpha_ios: true
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/images/logo.png"
    background_color: "#CC2200"
    theme_color: "#CC2200"

  macos:
    generate: true
    image_path: "assets/images/logo.png"

  windows:
    generate: true
    image_path: "assets/images/logo.png"
    icon_size: 48

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - .env
